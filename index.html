<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Textarea Character Counter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Kept only for script.js class toggling */
      #warning.show {
        display: block;
      }
      #warning {
        display: none;
      }
    </style>
  </head>

  <body>
   
    <div class="max-w-xl mx-auto p-4">
      <h2 class="text-xl font-semibold mb-4">Message</h2>

      <textarea
        id="message"
        maxlength="200"
        placeholder="Type your message..."
        aria-describedby="counter maxText warning"
        class="w-full h-36 p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 resize-y"
      ></textarea>

      <div class="mt-3 flex gap-3 flex-wrap text-gray-700 items-baseline">
        <div class="text-gray-500" id="maxText">200 characters max</div>
        <div class="font-bold" id="counter">0/200 characters</div>
      </div>

      <div class="mt-2 text-red-700 font-bold" id="warning" role="alert">
        Character limit reached. Further typing is prevented.
      </div>

        <form id="messageForm" class="mt-4">
          <button
            id="submitBtn"
            type="submit"
            disabled
            class="w-1/4 bg-blue-600 text-white py-2 px-4 rounded-md disabled:opacity-50 disabled:cursor-not-allowed hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
            Submit
          </button>
        </form>
        
    </div>
     

     

    <script src="./script.js"></script>
  </body>
</html>
